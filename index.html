<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHC Advance Management</title>
    <style>
        :root { --primary: #00705a; --secondary: #0056b3; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding: 0; font-size: 16px; }
        .container { max-width: 600px; margin: 20px auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2, h3, h4 { text-align: center; color: #333; margin-top: 5px; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box; font-size: 16px; }
        .btn-primary { background: var(--primary); color: white; font-weight: bold; border: none; cursor: pointer; }
        .btn-admin { background: #6c757d; color: white; border: none; cursor: pointer; }
        .field-card { border: 2px solid #ccc; padding: 15px; margin: 10px 0; border-radius: 8px; background: #fafafa; position: relative; }
        .hidden { display: none !important; }
        .status-bar { padding: 10px; text-align: center; font-weight: bold; border-radius: 5px; margin-bottom: 15px; }
        .online { background: #d4edda; color: #155724; }
        .edit-row { display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 10px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 5px; }
        .btn-edit { background: orange; color: white; border: none; width: auto; padding: 5px 15px; border-radius: 4px; }
        .btn-remove { background: #ff4d4d; color: white; padding: 4px 8px; font-size: 12px; border: none; width: auto; float: right; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .btn-logout { background: #dc3545; color: white; padding: 6px 12px; font-size: 14px; border: none; border-radius: 4px; cursor: pointer; width: auto; }
        .row-flex { display: flex; gap: 10px; align-items: center; }
        .row-flex > div { flex: 1; }
    </style>
</head>
<body>

    <div id="lockScreen" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#0f1c24; z-index:9999; display:flex; justify-content:center; align-items:center;">
        <div style="background:white; padding:30px; border-radius:10px; width:85%; max-width:350px;">
            <h3>Security Access</h3>
            <input type="password" id="sitePass" placeholder="Enter Password (1234)">
            <button class="btn-primary" onclick="unlockApp()">Unlock</button>
        </div>
    </div>

    <div class="container hidden" id="mainApp">
        <div id="netStatus" class="status-bar online">Online</div>

        <div id="loginBox">
            <h3>कर्मचारी लॉगिन</h3>
            <input type="tel" id="mob" placeholder="मोबाईल नंबर">
            <input type="password" id="pwd" placeholder="वैयक्तिक पासवर्ड">
            <button class="btn-primary" onclick="handleLogin()">प्रवेश करा</button>
        </div>

        <div id="adminPanel" class="hidden">
            <div style="display:flex; gap:10px;">
                <button class="btn-admin" onclick="openNewFormBuilder()">➕ नवीन फॉर्म</button>
                <button class="btn-primary" onclick="showSection('entryScreen')">⬅️ डेटा एंट्री</button>
            </div>
            <div id="existingFormsArea">
                <h4>अस्तित्वात असलेले फॉर्म (Edit करा)</h4>
                <div id="formsEditList"></div>
            </div>
            <hr>
            <div id="formBuilder" class="hidden" style="background: #fff8f0; padding: 15px; border-radius: 8px; border: 1px solid orange;">
                <h3 id="builderTitle">नवीन फॉर्म तयार करा</h3>
                <input type="hidden" id="editFormID">
                <input type="text" id="newFormName" placeholder="फॉर्मचे नाव (उदा. पाहणी अहवाल)">
                <select id="newFormType">
                    <option value="List">गावनिहाय लिस्ट (Data List)</option>
                    <option value="Stats">गावनिहाय आकडेवारी (Statistics)</option>
                </select>
                <div id="fieldsList"></div>
                <button onclick="addField()" style="background:#e9ecef; color:#333; font-weight:bold; border:1px solid #ccc;">+ नवीन प्रश्न जोडा</button>
                <button id="mainActionBtn" class="btn-primary" onclick="saveFullForm()">फॉर्म सेव्ह करा</button>
            </div>
        </div>

        <div id="entryScreen" class="hidden">
            <div class="header-bar">
                <h3 style="margin: 0;">स्वागत आहे, <span id="uName"></span></h3>
                <button class="btn-logout" onclick="logoutUser()">Log Out</button>
            </div>
            <p id="uSub" style="text-align:center; color:gray; margin-top: 5px;"></p>
            
            <div id="adminBtnDiv" class="hidden">
                <button class="btn-admin" onclick="showSection('adminPanel')">⚙️ Admin Settings</button>
            </div>
            
            <label>फॉर्म निवडा:</label>
            <select id="selForm" onchange="updateVillageDropdown(); loadDynamicFields();"></select>
            
            <div class="row-flex" style="margin-top: 10px;">
                <div>
                    <label>महिना:</label>
                    <select id="selMonth" onchange="updateVillageDropdown()">
                        <option value="जानेवारी">जानेवारी</option><option value="फेब्रुवारी">फेब्रुवारी</option>
                        <option value="मार्च">मार्च</option><option value="एप्रिल" selected>एप्रिल</option>
                        <option value="मे">मे</option><option value="जून">जून</option>
                        <option value="जुलै">जुलै</option><option value="ऑगस्ट">ऑगस्ट</option>
                        <option value="सप्टेंबर">सप्टेंबर</option><option value="ऑक्टोबर">ऑक्टोबर</option>
                        <option value="नोव्हेंबर">नोव्हेंबर</option><option value="डिसेंबर">डिसेंबर</option>
                    </select>
                </div>
                <div>
                    <label>वर्ष:</label>
                    <select id="selYear" onchange="updateVillageDropdown()">
                        <option value="2025">2025</option>
                        <option value="2026" selected>2026</option>
                        <option value="2027">2027</option>
                    </select>
                </div>
            </div>
            
            <label>गाव निवडा:</label>
            <select id="selVillage"></select>

            <div id="dynamicFormArea"></div>
            
            <button class="btn-primary" onclick="saveDataLocal()" style="margin-top:20px;">माहिती जतन करा</button>
            <button onclick="syncDataToServer()" style="background:#28a745; color:white;">Cloud Sync</button>
            <p id="syncStatus" style="text-align:center; font-size:14px; color:green; font-weight:bold;"></p>
        </div>
    </div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzODuA9XnQrD1vYnwggn7PabqYNd3dp9tMBqTsLyWLdVP3Zl0K-4Zg_fuxjtOHWjQKs/exec";
    let masterData = { forms: [], villages: [] };
    let user = null;

    async function unlockApp() {
        if(document.getElementById('sitePass').value === "1234") {
            document.getElementById('lockScreen').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('netStatus').innerText = "डेटा लोड होत आहे...";
            await fetchData();
            document.getElementById('netStatus').innerText = "Online";

            const savedUser = localStorage.getItem("phc_user_session");
            if(savedUser) { user = JSON.parse(savedUser); showAppAfterLogin(); }
        } else { alert("चुकीचा पासवर्ड!"); }
    }

    async function fetchData() {
        try {
            const r = await fetch(GAS_URL + "?action=getInitialData");
            const d = await r.json();
            if(d.success) { masterData = d; updateFormDropdown(); renderFormsListForEdit(); }
        } catch(e) { console.error("Fetch failed"); }
    }

    async function handleLogin() {
        const m = document.getElementById('mob').value.trim();
        const p = document.getElementById('pwd').value.trim();
        if(!m || !p) { alert("नंबर आणि पासवर्ड टाका"); return; }
        document.getElementById('netStatus').innerText = "तपासत आहे...";
        try {
            const r = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({action:"login", mobileNo:m, password:p}) });
            const d = await r.json();
            if(d.success) {
                user = d.user; user.mobile = m;
                localStorage.setItem("phc_user_session", JSON.stringify(user));
                showAppAfterLogin();
            } else { alert(d.message); }
            document.getElementById('netStatus').innerText = "Online";
        } catch(e) { alert("लॉगिन अयशस्वी."); document.getElementById('netStatus').innerText = "Offline"; }
    }

    function showAppAfterLogin() {
        document.getElementById('loginBox').classList.add('hidden');
        document.getElementById('entryScreen').classList.remove('hidden');
        document.getElementById('uName').innerText = user.name;
        document.getElementById('uSub').innerText = "उपकेंद्र: " + user.subcenter;
        if(user.role === "Admin") { document.getElementById('adminBtnDiv').classList.remove('hidden'); renderFormsListForEdit(); }
        updateVillageDropdown(); // लोड होताना गावे दाखवा
    }

    function logoutUser() {
        if(confirm("तुम्हाला नक्की लॉग आऊट करायचे आहे का?")) {
            localStorage.removeItem("phc_user_session"); location.reload();
        }
    }

    // --- Admin Form Builder Logic (आधीप्रमाणेच) ---
    function renderFormsListForEdit() {
        const listDiv = document.getElementById('formsEditList');
        listDiv.innerHTML = "";
        masterData.forms.forEach(f => {
            listDiv.innerHTML += `<div class="edit-row"><span><b>${f.FormName}</b></span><button class="btn-edit" onclick="startEditing('${f.FormID}')">Edit</button></div>`;
        });
    }

    function openNewFormBuilder() {
        showSection('formBuilder');
        document.getElementById('builderTitle').innerText = "नवीन फॉर्म तयार करा";
        document.getElementById('editFormID').value = "";
        document.getElementById('newFormName').value = "";
        document.getElementById('fieldsList').innerHTML = "";
        document.getElementById('mainActionBtn').innerText = "फॉर्म सेव्ह करा";
        document.getElementById('mainActionBtn').onclick = saveFullForm;
    }

    function startEditing(fId) {
        const f = masterData.forms.find(x => x.FormID === fId);
        if(!f) return;
        showSection('formBuilder');
        document.getElementById('builderTitle').innerText = "फॉर्म एडिट: " + f.FormName;
        document.getElementById('editFormID').value = f.FormID;
        document.getElementById('newFormName').value = f.FormName;
        document.getElementById('newFormType').value = f.FormType;
        document.getElementById('fieldsList').innerHTML = "";
        document.getElementById('mainActionBtn').innerText = "बदल अपडेट करा (Update)";
        document.getElementById('mainActionBtn').onclick = updateExistingForm;
        JSON.parse(f.StructureJSON).forEach(field => addField(field));
    }

    function addField(data = null) {
        const id = Math.floor(Math.random() * 1000000); 
        const html = `
            <div class="field-card" id="f_${id}">
                <button type="button" class="btn-remove" onclick="this.parentElement.remove()">X</button>
                <div style="display:flex; flex-direction:column; gap:5px; margin-top: 15px;">
                    <label style="font-size:14px; color:#555;">मुख्य प्रश्नाचे नाव:</label>
                    <input type="text" placeholder="उदा. ब्लिचिंग पावडर" class="fname" style="width:100%;" value="${data ? data.label : ''}">
                </div>
                
                <select class="ftype" onchange="toggleFieldOptions('${id}', this.value)" style="margin-top:10px; background:#f0f8ff;">
                    <option value="text" ${data && data.type==='text'?'selected':''}>Text (साधा मजकूर)</option>
                    <option value="number" ${data && data.type==='number'?'selected':''}>Number (आकडे)</option>
                    <option value="date" ${data && data.type==='date'?'selected':''}>Date (तारीख)</option>
                    <option value="dropdown" ${data && data.type==='dropdown'?'selected':''}>Dropdown (एकच प्रश्न आणि अनेक पर्याय)</option>
                    <option value="group" ${data && data.type==='group'?'selected':''}>Group / गट (एकाच नावाखाली अनेक उप-प्रश्न)</option>
                </select>
                
                <div id="opts_${id}" style="display:${data && data.type==='dropdown' ? 'block' : 'none'}; margin-top:10px; background:#ffe4b5; padding:10px; border-radius:5px;">
                    <label style="font-size:12px;">येथे पर्याय लिहा (स्वल्पविरामाने , वेगळे करा):</label>
                    <input type="text" placeholder="उदा. होय, नाही" class="foptions" value="${data ? (data.options || '') : ''}">
                </div>

                <div id="group_${id}" style="display:${data && data.type==='group' ? 'block' : 'none'}; margin-top:10px; background:#eef; padding:10px; border-radius:5px; border-left: 3px solid var(--primary);">
                    <label style="font-size:13px; font-weight:bold; color:var(--primary);">या गटातील उप-प्रश्न जोडा:</label>
                    <div id="subfields_container_${id}"></div>
                    <button type="button" onclick="addSubFieldUI('${id}')" style="margin-top:10px; font-size:13px; background:#fff; border:1px solid #ccc; padding:6px; cursor:pointer; width:100%;">+ उप-प्रश्न जोडा</button>
                </div>
            </div>`;
        document.getElementById('fieldsList').insertAdjacentHTML('beforeend', html);

        if(data && data.type === 'group' && data.subFields) {
            data.subFields.forEach(sf => addSubFieldUI(id, sf));
        } else if (data && data.type === 'group') {
            addSubFieldUI(id);
        }
    }

    function toggleFieldOptions(id, val) {
        document.getElementById('opts_' + id).style.display = (val === 'dropdown') ? 'block' : 'none';
        document.getElementById('group_' + id).style.display = (val === 'group') ? 'block' : 'none';
    }

    function addSubFieldUI(parentId, sfData = null) {
        const sfId = Math.floor(Math.random() * 1000000);
        const html = `
            <div class="sub-field-item" id="sf_${sfId}" style="position: relative; display: flex; flex-direction: column; gap: 8px; background: #fff; padding: 12px; padding-top: 25px; border-radius: 5px; border: 1px solid #ccc; margin-top: 10px;">
                <button type="button" class="btn-remove" onclick="this.parentElement.remove()" style="position: absolute; top: 5px; right: 5px;">X</button>
                <input type="text" placeholder="उप-प्रश्नाचे नाव (उदा. उपलब्धता)" class="sfname" style="width: 100%;" value="${sfData ? sfData.label : ''}">
                <select class="sftype" style="width: 100%;" onchange="document.getElementById('sfopts_${sfId}').style.display = this.value==='dropdown' ? 'block' : 'none'">
                    <option value="text" ${sfData && sfData.type==='text'?'selected':''}>Text (मजकूर)</option>
                    <option value="dropdown" ${sfData && sfData.type==='dropdown'?'selected':''}>Dropdown (पर्याय)</option>
                </select>
                <input type="text" id="sfopts_${sfId}" placeholder="पर्याय लिहा (स्वल्पविरामाने वेगळे करा)" class="sfopts" style="width: 100%; margin-top: 5px; display:${sfData && sfData.type==='dropdown'?'block':'none'}" value="${sfData ? (sfData.options || '') : ''}">
            </div>
        `;
        document.getElementById('subfields_container_' + parentId).insertAdjacentHTML('beforeend', html);
    }

    function getFieldsData() {
        let fields = [];
        document.querySelectorAll('.field-card').forEach(el => {
            let fieldObj = {
                label: el.querySelector('.fname').value,
                type: el.querySelector('.ftype').value,
                options: el.querySelector('.foptions') ? el.querySelector('.foptions').value : ""
            };
            if (fieldObj.type === 'group') {
                fieldObj.subFields = [];
                el.querySelectorAll('.sub-field-item').forEach(sfEl => {
                    fieldObj.subFields.push({
                        label: sfEl.querySelector('.sfname').value,
                        type: sfEl.querySelector('.sftype').value,
                        options: sfEl.querySelector('.sfopts').value
                    });
                });
            }
            fields.push(fieldObj);
        });
        return fields;
    }

    async function saveFullForm() {
        const name = document.getElementById('newFormName').value;
        const type = document.getElementById('newFormType').value;
        if(!name) { alert("फॉर्मचे नाव टाका"); return; }
        const payload = { name, type, fields: getFieldsData(), adminMobile: user.mobile };
        const r = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({action:"createForm", payload}) });
        const d = await r.json();
        if(d.success) { alert(d.message); location.reload(); }
    }

    async function updateExistingForm() {
        const formID = document.getElementById('editFormID').value;
        const name = document.getElementById('newFormName').value;
        const type = document.getElementById('newFormType').value;
        const payload = { formID, name, type, fields: getFieldsData() };
        const r = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({action:"updateForm", payload}) });
        const d = await r.json();
        if(d.success) { alert(d.message); location.reload(); }
    }

    function showSection(id) {
        document.getElementById('entryScreen').classList.add('hidden');
        document.getElementById('adminPanel').classList.add('hidden');
        document.getElementById('formBuilder').classList.add('hidden');
        if(id === 'formBuilder') {
            document.getElementById('adminPanel').classList.remove('hidden');
            document.getElementById('formBuilder').classList.remove('hidden');
        } else { document.getElementById(id).classList.remove('hidden'); }
    }

    function updateFormDropdown() {
        const sel = document.getElementById('selForm');
        sel.innerHTML = '<option value="">-- निवडा --</option>';
        masterData.forms.forEach(f => sel.innerHTML += `<option value="${f.FormID}">${f.FormName}</option>`);
    }

    // --- नवीन: गावे फिल्टर करण्याचे लॉजिक (Smart Filter) ---
    function updateVillageDropdown() {
        const vSel = document.getElementById('selVillage');
        const fId = document.getElementById('selForm').value;
        const month = document.getElementById('selMonth').value;
        const year = document.getElementById('selYear').value;
        
        vSel.innerHTML = '<option value="">-- गाव निवडा --</option>';
        if(!user) return;

        const selectedForm = masterData.forms.find(f => f.FormID === fId);
        const isStatsForm = selectedForm && selectedForm.FormType === 'Stats';

        // लोकल मेमरीमधून भरलेल्या फॉर्म्सची हिस्ट्री घेणे
        const history = JSON.parse(localStorage.getItem("submissionHistory") || "[]");

        masterData.villages.filter(v => {
            // फक्त स्वतःच्या उपकेंद्राची गावे
            const belongsToSubCenter = v.SubCenterID.toLowerCase() === user.subcenter.toLowerCase() || v.SubCenterID.toLowerCase() === "all";
            if(!belongsToSubCenter) return false;

            // जर 'आकडेवारी' (Stats) फॉर्म असेल, आणि या महिन्यासाठी आधीच डेटा भरला असेल, तर ते गाव लपवा
            if(isStatsForm) {
                const isAlreadyFilled = history.some(h => h.formID === fId && h.village === v.VillageName && h.month === month && h.year === year);
                if(isAlreadyFilled) return false;
            }
            return true;
        }).forEach(v => {
            vSel.innerHTML += `<option value="${v.VillageName}">${v.VillageName}</option>`;
        });
    }

    function loadDynamicFields() {
        const fId = document.getElementById('selForm').value;
        const area = document.getElementById('dynamicFormArea');
        area.innerHTML = "";
        const f = masterData.forms.find(x => x.FormID === fId);
        if(!f) return;
        
        JSON.parse(f.StructureJSON).forEach((field, i) => {
            if (field.type === 'group') {
                let html = `<div style="margin-bottom:15px; background:#fffaf0; padding:12px; border-radius:8px; border:1px solid #f5b041;">
                            <h4 style="margin-top:0; color:var(--primary); text-align:left; border-bottom:1px solid #ccc; padding-bottom:5px;">${field.label}</h4>`;
                
                field.subFields.forEach((sf, j) => {
                    html += `<div style="margin-bottom:10px;"><label style="font-size:14px; color:#555;"><b>${sf.label}:</b></label>`;
                    if (sf.type === 'dropdown') {
                        html += `<select id="inp_${i}_${j}"><option value="">-- निवडा --</option>`;
                        if(sf.options) {
                            sf.options.split(',').forEach(opt => {
                                let o = opt.trim();
                                if(o) html += `<option value="${o}">${o}</option>`;
                            });
                        }
                        html += `</select>`;
                    } else {
                        html += `<input type="text" id="inp_${i}_${j}">`;
                    }
                    html += `</div>`;
                });
                html += `</div>`;
                area.innerHTML += html;
            } else {
                let html = `<div style="margin-bottom:15px; background:white; padding:10px; border-radius:8px; border:1px solid #ddd;"><label><b>${field.label}:</b></label>`;
                if(field.type === 'dropdown') {
                    html += `<select id="inp_${i}"><option value="">-- निवडा --</option>`;
                    if(field.options) {
                        field.options.split(',').forEach(opt => {
                            let o = opt.trim();
                            if(o) html += `<option value="${o}">${o}</option>`;
                        });
                    }
                    html += `</select>`;
                } else {
                    html += `<input type="${field.type}" id="inp_${i}">`;
                }
                area.innerHTML += html + `</div>`;
            }
        });
    }

    function saveDataLocal() {
        const fId = document.getElementById('selForm').value;
        const vName = document.getElementById('selVillage').value;
        const month = document.getElementById('selMonth').value;
        const year = document.getElementById('selYear').value;

        if(!fId || !vName) { alert("कृपया फॉर्म आणि गाव निवडा!"); return; }
        
        let formData = {};
        
        // महिना आणि वर्ष गुगल शीटमध्ये सेव्ह करण्यासाठी JSON मध्ये ॲड केले
        formData["महिना"] = month;
        formData["वर्ष"] = year;

        const f = masterData.forms.find(x => x.FormID === fId);
        JSON.parse(f.StructureJSON).forEach((field, i) => {
            if (field.type === 'group') {
                field.subFields.forEach((sf, j) => {
                    formData[`${field.label} - ${sf.label}`] = document.getElementById(`inp_${i}_${j}`).value;
                });
            } else {
                formData[field.label] = document.getElementById('inp_'+i).value;
            }
        });
        
        // सिंक करण्यासाठी रांगेत टाकणे
        const entry = { entryID: Date.now(), mobileNo: user.mobile, subCenter: user.subcenter, village: vName, formID: fId, formData: formData };
        let q = JSON.parse(localStorage.getItem("syncQueue") || "[]");
        q.push(entry);
        localStorage.setItem("syncQueue", JSON.stringify(q));

        // हिस्ट्री सेव्ह करणे (जेणेकरून ते गाव लपवता येईल)
        let history = JSON.parse(localStorage.getItem("submissionHistory") || "[]");
        history.push({formID: fId, village: vName, month: month, year: year});
        localStorage.setItem("submissionHistory", JSON.stringify(history));

        // सलग एंट्रीसाठी फॉर्म रिसेट करणे
        document.getElementById('syncStatus').innerText = "रेकॉर्ड सेव्ह झाला! तुम्ही लगेच पुढील गावाची माहिती भरू शकता.";
        setTimeout(() => document.getElementById('syncStatus').innerText = "", 3000);
        
        updateVillageDropdown(); // याने भरलेले गाव (Stats असल्यास) यादीतून गायब होईल
        loadDynamicFields(); // फॉर्म रिकामा करेल
    }

    async function syncDataToServer() {
        let q = JSON.parse(localStorage.getItem("syncQueue") || "[]");
        if(q.length === 0) { alert("सर्व्हरवर पाठवण्यासाठी नवीन डेटा नाही."); return; }
        document.getElementById('syncStatus').innerText = "डेटा सर्व्हरवर पाठवत आहे...";
        try {
            const r = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({action:"syncData", payload: q}) });
            const d = await r.json();
            if(d.success) { localStorage.setItem("syncQueue", "[]"); alert("सर्व माहिती ऑनलाइन अपडेट झाली!"); document.getElementById('syncStatus').innerText = ""; }
        } catch(e) { alert("एरर आला. इंटरनेट चालू असल्याची खात्री करा."); }
    }
</script>
