<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PHC Advance Management</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>

<style>
:root { --primary: #00705a; --secondary: #0056b3; --bg: #f4f7f6; }
body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding: 0; font-size: 16px; }
.container { max-width: 800px; margin: 20px auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
h2, h3, h4 { text-align: center; color: #333; margin-top: 5px; }
input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box; font-size: 16px; }
.btn-primary { background: var(--primary); color: white; font-weight: bold; border: none; cursor: pointer; }
.btn-admin { background: #6c757d; color: white; border: none; cursor: pointer; }
.btn-report { background: #17a2b8; color: white; border: none; cursor: pointer; font-weight: bold; }
.btn-edit-tab { background: #ff9800; color: white; border: none; cursor: pointer; font-weight: bold; }

button:disabled { background: #ccc !important; color: #666 !important; cursor: not-allowed !important; box-shadow: none !important; }

.field-card { border: 2px solid #ccc; padding: 15px; padding-top: 45px; margin: 10px 0; border-radius: 8px; background: #fafafa; position: relative; }
.sub-field-item { position: relative; display: flex; flex-direction: column; gap: 5px; background: #fff; padding: 12px; padding-top: 35px; border-radius: 5px; border: 1px solid #ccc; margin-top: 10px; }
.sub-sub-field-item { background: white; padding: 8px; margin-top: 5px; border: 1px solid #b2ebf2; border-radius: 4px; position: relative; padding-top: 25px; }

.btn-remove { background: #ff4d4d !important; color: white !important; padding: 6px 12px !important; font-size: 13px !important; border: none !important; width: auto !important; border-radius: 4px !important; font-weight: bold !important; cursor: pointer !important; position: absolute !important; top: 8px !important; right: 8px !important; margin: 0 !important; }
.hidden { display: none !important; }
.status-bar { padding: 10px; text-align: center; font-weight: bold; border-radius: 5px; margin-bottom: 15px; }
.online { background: #d4edda; color: #155724; }
.header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
.btn-logout { background: #dc3545; color: white; padding: 6px 12px; font-size: 14px; border: none; border-radius: 4px; cursor: pointer; width: auto; }
.row-flex { display: flex; gap: 10px; align-items: center; }
.row-flex > div { flex: 1; }

.table-responsive { width: 100%; overflow-x: auto; margin-top: 15px; }
.report-table { width: 100%; border-collapse: collapse; min-width: 600px; background: white; margin-bottom: 25px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); border: 1px solid #ddd; }
.report-table th { padding: 10px; text-align: center; white-space: nowrap; border: 1px solid #ddd; }
.report-table td { padding: 8px 10px; border: 1px solid #ddd; font-size: 14px; color: #333; text-align: center; }
.report-table tr:nth-child(even) { background-color: #f9f9f9; }
.report-table tr:hover { background-color: #f1f1f1; }

.nav-tabs { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 20px; background: #eee; padding: 5px; border-radius: 8px; }
.nav-tab { flex: 1 1 20%; text-align: center; padding: 10px; background: transparent; border: none; font-weight: bold; color: #555; border-radius: 6px; cursor: pointer; font-size: 14px; }
.nav-tab.active { background: white; color: var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

/* Bulk Data Entry Table Styles */
.report-table input, .report-table select { padding: 6px; margin: 0; width: 100px; font-size: 14px; border-radius: 4px; border: 1px solid #ccc; }
.report-table td { padding: 6px; vertical-align: middle; }
.sticky-col { position: sticky; left: 0; background: #fdfdfd !important; border-right: 2px solid #ccc; z-index: 5; font-weight: bold; min-width: 100px; text-align:center;}

@media (max-width: 768px) {
  .mobile-hide { display: none !important; }
}
</style>
</head>
<body>

<script>
// 🌟 Configuration 🌟
const GAS_URL = "https://script.google.com/macros/s/AKfycbzODuA9XnQrD1vYnwggn7PabqYNd3dp9tMBqTsLyWLdVP3Zl0K-4Zg_fuxjtOHWjQKs/exec";

const CONFIG = {
hiddenColumns: ["तारीख", "मोबाईल क्र.", "उपकेंद्र", "महिना", "वर्ष", "मूळ डेटा (JSON)", "कर्मचाऱ्याचे नाव"]
};

let masterData = { forms: [], villages: [], filledStats: [] };
let user = null;
let currentReports = [];
let isSaving = false;

function isMobile() {
    return window.innerWidth <= 768; 
}

function isFormInactive(f) {
    if (f.Status !== undefined && f.Status !== null) {
        let s = String(f.Status).trim().toUpperCase();
        return (s === "INACTIVE" || s === "FALSE");
    }
    if (f.isActive !== undefined && f.isActive !== null) {
        let s = String(f.isActive).trim().toUpperCase();
        return (s === "FALSE" || s === "INACTIVE");
    }
    return false;
}

// --- Helper Functions ---
function generateInputHTML(f, id, label, areaId, val="") {
let html = "";
let depAttr = f.dependency ? `data-dependency="${f.dependency}"` : "";
let rangeAttr = "";

if (f.type === 'number' && f.range) {
let r = String(f.range).trim();
if (r.startsWith('<=')) {
let max = Number(r.replace('<=', '').trim());
rangeAttr = ` max="${max}" title="कृपया ${max} किंवा त्यापेक्षा कमी संख्या टाका" onchange="if(this.value && Number(this.value) > ${max}) { alert('⚠️ कृपया ${max} किंवा त्यापेक्षा कमी संख्या टाका'); this.value=''; calculateAutoSums('${areaId}'); handleDependencies('${areaId}'); }"`;
} else if (r.startsWith('<')) {
let max = Number(r.replace('<', '').trim());
rangeAttr = ` max="${max-1}" title="कृपया ${max} पेक्षा कमी संख्या टाका" onchange="if(this.value && Number(this.value) >= ${max}) { alert('⚠️ कृपया ${max} पेक्षा कमी संख्या टाका'); this.value=''; calculateAutoSums('${areaId}'); handleDependencies('${areaId}'); }"`;
} else if (r.startsWith('>=')) {
let min = Number(r.replace('>=', '').trim());
rangeAttr = ` min="${min}" title="कृपया ${min} किंवा त्यापेक्षा जास्त संख्या टाका" onchange="if(this.value && Number(this.value) < ${min}) { alert('⚠️ कृपया ${min} किंवा त्यापेक्षा जास्त संख्या टाका'); this.value=''; calculateAutoSums('${areaId}'); handleDependencies('${areaId}'); }"`;
} else if (r.startsWith('>')) {
let min = Number(r.replace('>', '').trim());
rangeAttr = ` min="${min+1}" title="कृपया ${min} पेक्षा जास्त संख्या टाका" onchange="if(this.value && Number(this.value) <= ${min}) { alert('⚠️ कृपया ${min} पेक्षा जास्त संख्या टाका'); this.value=''; calculateAutoSums('${areaId}'); handleDependencies('${areaId}'); }"`;
} else if (r.includes('-')) {
let parts = r.split('-');
if(parts.length === 2) {
let min = parts[0].trim();
let max = parts[1].trim();
rangeAttr = ` min="${min}" max="${max}" title="कृपया ${min} ते ${max} च्या दरम्यानची संख्या टाका" onchange="if(this.value && (Number(this.value) < ${min} || Number(this.value) > ${max})) { alert('⚠️ कृपया ${min} ते ${max} च्या दरम्यानची संख्या टाका'); this.value=''; calculateAutoSums('${areaId}'); handleDependencies('${areaId}'); }"`;
}
}
}

if (f.type === 'dropdown') {
html += `<select id="${id}" data-label="${label}" ${depAttr} onchange="calculateAutoSums('${areaId}'); handleDependencies('${areaId}')"><option value="">-- निवडा --</option>`;
if(f.options) { f.options.split(',').forEach(opt => {
let o = opt.trim();
let sel = (o === val) ? "selected" : "";
if(o) html += `<option value="${o}" ${sel}>${o}</option>`;
}); }
html += `</select>`;
} else if(f.type === 'sum') {
html += `<input type="number" id="${id}" data-label="${label}" data-sum-targets="${f.options}" value="${val}" readonly style="background:#e9ecef; font-weight:bold; color:var(--primary); cursor:not-allowed;" placeholder="Auto Sum">`;
} else if(f.type === 'number') {
html += `<input type="number" id="${id}" data-label="${label}" ${depAttr} ${rangeAttr} value="${val}" oninput="calculateAutoSums('${areaId}'); handleDependencies('${areaId}')">`;
} else if(f.type === 'mobile') {
html += `<input type="tel" id="${id}" data-label="${label}" ${depAttr} value="${val}" maxlength="10" pattern="[0-9]{10}" title="10 अंकी मोबाईल नंबर टाका" placeholder="10 अंकी नंबर" oninput="this.value=this.value.replace(/[^0-9]/g,''); if(this.value.length>10) this.value=this.value.slice(0,10); calculateAutoSums('${areaId}'); handleDependencies('${areaId}')">`;
} else if(f.type === 'date') {
html += `<input type="date" id="${id}" data-label="${label}" ${depAttr} value="${val}" onchange="calculateAutoSums('${areaId}'); handleDependencies('${areaId}')">`;
} else {
html += `<input type="text" id="${id}" data-label="${label}" ${depAttr} value="${val}" oninput="calculateAutoSums('${areaId}'); handleDependencies('${areaId}')">`;
}
return html;
}

function handleDependencies(containerId) {
let container = document.getElementById(containerId);
if(!container) return;

let dependentInputs = container.querySelectorAll('[data-dependency]');

dependentInputs.forEach(depInput => {
let rule = depInput.getAttribute('data-dependency');
if(!rule) return;

let parts = rule.split('=');
if(parts.length === 2) {
let parentTargetLabel = parts[0].trim();
let subParts = parts[1].split(':');

if(subParts.length === 2) {
let conditionVal = subParts[0].trim().toLowerCase();
let targetVal = subParts[1].trim();

let parentElement = container.querySelector(`[data-label="${parentTargetLabel}"]`);

if(!parentElement) {
let allInputs = container.querySelectorAll('[data-label]');
let cleanTarget = parentTargetLabel.replace(/\s+/g, '').toLowerCase();
for(let inp of allInputs) {
let currentLabel = inp.getAttribute('data-label').replace(/\s+/g, '').toLowerCase();
if(currentLabel === cleanTarget || currentLabel.endsWith(cleanTarget) || currentLabel.endsWith("-" + cleanTarget)) {
parentElement = inp;
break;
}
}
}

if(parentElement) {
let currentParentVal = parentElement.value.trim().toLowerCase();

if(currentParentVal === conditionVal && conditionVal !== "") {
depInput.value = targetVal;
depInput.style.pointerEvents = "none";
depInput.style.backgroundColor = "#e9ecef";
depInput.tabIndex = -1;
} else {
if(depInput.style.pointerEvents === "none") {
depInput.value = "";
depInput.style.pointerEvents = "auto";
depInput.style.backgroundColor = "";
depInput.removeAttribute("tabIndex");
}
}
}
}
}
});
}

function extractFieldsFromForm(f) {
let fields = [];
JSON.parse(f.StructureJSON).forEach((field, i) => {
if (field.type === 'group') {
field.subFields.forEach((sf, j) => {
if (sf.type === 'group') {
sf.subFields.forEach((ssf, k) => {
let label = `${field.label} - ${sf.label} - ${ssf.label}`;
fields.push({ label, idSuffix: `${i}_${j}_${k}`, orig: ssf });
});
} else {
let label = `${field.label} - ${sf.label}`;
fields.push({ label, idSuffix: `${i}_${j}`, orig: sf });
}
});
} else {
fields.push({ label: field.label, idSuffix: `${i}`, orig: field });
}
});
return fields;
}

// 🟢 PC View साठी ३-लेयर डायनॅमिक टेबल हेडर्स 
function generateTableHeaders(f) {
    let maxDepth = 1;
    let struct = JSON.parse(f.StructureJSON);
    struct.forEach(field => {
        if (field.type === 'group') {
            maxDepth = Math.max(maxDepth, 2);
            field.subFields.forEach(sf => {
                if (sf.type === 'group') maxDepth = 3;
            });
        }
    });

    let r1 = "", r2 = "", r3 = "";
    r1 += `<th rowspan="${maxDepth}" class="sticky-header-col" style="background:#00705a; color:white; z-index:4; position:sticky; top:0; left:0; border:1px solid #ddd; padding:10px; text-align:center;">गाव (Village)</th>`;

    struct.forEach(field => {
        if (field.type === 'group') {
            let colSpan1 = 0;
            let fieldHtml2 = "", fieldHtml3 = "";
            field.subFields.forEach(sf => {
                if (sf.type === 'group') {
                    let colSpan2 = sf.subFields.length;
                    colSpan1 += colSpan2;
                    fieldHtml2 += `<th colspan="${colSpan2}" style="background:#00705a; color:white; border:1px solid #ddd; padding:8px; text-align:center;">${sf.label}</th>`;
                    sf.subFields.forEach(ssf => {
                        fieldHtml3 += `<th style="background:#00705a; color:white; font-size:12px; border:1px solid #ddd; padding:6px; text-align:center;">${ssf.label}</th>`;
                    });
                } else {
                    colSpan1 += 1;
                    let rs2 = maxDepth === 3 ? 2 : 1;
                    fieldHtml2 += `<th rowspan="${rs2}" style="background:#00705a; color:white; font-size:12px; border:1px solid #ddd; padding:8px; text-align:center;">${sf.label}</th>`;
                }
            });
            r1 += `<th colspan="${colSpan1}" style="background:#00705a; color:white; border:1px solid #ddd; padding:10px; text-align:center;">${field.label}</th>`;
            r2 += fieldHtml2;
            r3 += fieldHtml3;
        } else {
            r1 += `<th rowspan="${maxDepth}" style="background:#00705a; color:white; font-size:12px; border:1px solid #ddd; padding:10px; text-align:center;">${field.label}</th>`;
        }
    });

    let thead = `<tr>${r1}</tr>`;
    if (maxDepth >= 2) thead += `<tr>${r2}</tr>`;
    if (maxDepth === 3) thead += `<tr>${r3}</tr>`;
    return thead;
}

});
return formData;
}

async function fetchData() {
try {

function isFormFilledForVillage(formObj, vName, month, year) {
    const localHistory = JSON.parse(localStorage.getItem("submissionHistory") || "[]");
    const serverHistory = masterData.filledStats || [];

    let allowedRoles = formObj.AllowedRoles ? formObj.AllowedRoles.split(',').map(r=>String(r).trim().toUpperCase()) : ["ALL"];
    let isAll = allowedRoles.includes("ALL");

    let safeVName = String(vName).trim();
    let safeMonth = String(month).trim();
    let safeYear = String(year).trim();
    let safeMobile = String(user.mobile).trim();

    const isLocalFilled = localHistory.some(h =>
        h.formID === formObj.FormID && String(h.village).trim() === safeVName &&
        String(h.month).trim() === safeMonth && String(h.year).trim() === safeYear &&
        String(h.mobile).trim() === safeMobile
    );

    const isServerFilled = serverHistory.some(h => {
        if(h.formID !== formObj.FormID || String(h.village).trim() !== safeVName || String(h.month).trim() !== safeMonth || String(h.year).trim() !== safeYear) return false;
        if(h.isAllForm || isAll) return true;
        return String(h.mobile).trim() === safeMobile;
    });

    return isLocalFilled || isServerFilled;
}

function updateFormDropdowns() {
    const selForm = document.getElementById('selForm');
    const editForm = document.getElementById('editFormSelect');
    const repForm = document.getElementById('reportFormSelect');

    const entryMonth = document.getElementById('selMonth') ? document.getElementById('selMonth').value : "";
    const entryYear = document.getElementById('selYear') ? document.getElementById('selYear').value : "";

    let currentSel = selForm ? selForm.value : "";
    let currentEdit = editForm ? editForm.value : "";
    let currentRep = repForm ? repForm.value : "";

    if(selForm) {
        selForm.innerHTML = '<option value="">-- निवडा --</option>';
        selForm.innerHTML += '<option value="ALL_STATS" style="font-weight:bold; color:#d35400;">📝 सर्व आकडेवारी अहवाल एकत्रित भरा (All Stats)</option>';
    }
    if(editForm) editForm.innerHTML = '<option value="">-- निवडा --</option>';
    if(repForm) repForm.innerHTML = '<option value="">-- निवडा --</option><option value="ALL" style="font-weight:bold; color:var(--primary);">सर्व अहवाल एकत्रित (All Forms)</option>';

    if (!masterData || !masterData.forms) return;

    masterData.forms.forEach(f => {
        let allowedRoles = f.AllowedRoles ? f.AllowedRoles.split(',').map(r=>String(r).trim().toUpperCase()) : ["ALL"];
        let userRole = user ? String(user.role).trim().toUpperCase() : "";
        let isInactive = isFormInactive(f);
        let formType = String(f.FormType).trim();

        if (userRole === "ADMIN" || allowedRoles.includes("ALL") || allowedRoles.includes(userRole)) {
            if (isInactive && userRole !== "ADMIN") return;

            let isFullyFilled = false;
            if (user && entryMonth && entryYear && (formType === 'Stats' || formType === 'ProgressiveStats')) {
                let hasVillages = false;
                let fullyFilledCheck = true;
                masterData.villages.forEach(v => {
                    const belongsToSubCenter = String(v.SubCenterID).trim().toLowerCase() === String(user.subcenter).trim().toLowerCase() || String(v.SubCenterID).trim().toLowerCase() === "all";
                    if(belongsToSubCenter) {
                        hasVillages = true;
                        if (!isFormFilledForVillage(f, v.VillageName, entryMonth, entryYear)) {
                            fullyFilledCheck = false;
                        }
                    }
                });
                if (hasVillages && fullyFilledCheck) {
                    isFullyFilled = true;
                }
            }

            let opt = `<option value="${f.FormID}">${f.FormName} ${isInactive ? '(Inactive)' : ''}</option>`;

            if(selForm && !isFullyFilled) {
                selForm.innerHTML += opt;
            }
            if(editForm) editForm.innerHTML += opt;
            if(repForm) repForm.innerHTML += opt; 
        }
    });

    if(selForm) {
        if(selForm.querySelector(`option[value="${currentSel}"]`)) {
            selForm.value = currentSel;
        } else { 
            selForm.value = ""; 
            if(document.getElementById('dynamicFormArea')) document.getElementById('dynamicFormArea').innerHTML = ""; 
        }
    }
    if(editForm && editForm.querySelector(`option[value="${currentEdit}"]`)) editForm.value = currentEdit;
    if(repForm && repForm.querySelector(`option[value="${currentRep}"]`)) repForm.value = currentRep;
}

function updateVillageDropdown() {
const vSel = document.getElementById('selVillage');
const fId = document.getElementById('selForm').value;
const month = document.getElementById('selMonth').value;
const year = document.getElementById('selYear').value;

vSel.innerHTML = '<option value="">-- गाव निवडा --</option>';
if(!user || !fId) { document.getElementById('dynamicFormArea').innerHTML = ""; return; }

vSel.innerHTML += '<option value="ALL_VILLAGES" style="font-weight:bold; color:#0056b3;">🏢 सर्व गावे एकत्रित भरा (Bulk Entry)</option>';

masterData.villages.filter(v => {
const belongsToSubCenter = String(v.SubCenterID).trim().toLowerCase() === String(user.subcenter).trim().toLowerCase() || String(v.SubCenterID).trim().toLowerCase() === "all";
if(!belongsToSubCenter) return false;

if (fId === "ALL_STATS") {
let statsForms = masterData.forms.filter(f => { let t = String(f.FormType).trim(); return t === 'Stats' || t === 'ProgressiveStats'; });
let userRole = user ? String(user.role).trim().toUpperCase() : "";

let isFullyFilled = true;
for (let f of statsForms) {
let isInactive = isFormInactive(f);
if (isInactive && userRole !== "ADMIN") continue;

async function saveDataLocal() {
if(isSaving) return;
const saveBtn = document.getElementById('mainSaveBtn');
if(saveBtn) saveBtn.disabled = true;
isSaving = true;

try {
const fId = document.getElementById('selForm').value;
const vName = document.getElementById('selVillage').value;
const month = document.getElementById('selMonth').value;
const year = document.getElementById('selYear').value;

if(!fId || !vName) {
alert("कृपया फॉर्म आणि गाव निवडा!");
return;
}

let isBulk = (vName === "ALL_VILLAGES");

let baseVillages = [];
masterData.villages.forEach(v => {
if(String(v.SubCenterID).trim().toLowerCase() === String(user.subcenter).trim().toLowerCase() || String(v.SubCenterID).trim().toLowerCase() === "all") {
baseVillages.push(v.VillageName);
}
});
let availableVillages = isBulk ? baseVillages : [vName];

let formsToProcess = [];
let prefixMap = {};

if (fId === "ALL_STATS") {
let statsForms = masterData.forms.filter(f => { let t = String(f.FormType).trim(); return t === 'Stats' || t === 'ProgressiveStats'; });
let userRole = user ? String(user.role).trim().toUpperCase() : "";
statsForms.forEach(f => {
let isInactive = isFormInactive(f);
if (isInactive && userRole !== "ADMIN") return;

let allowedRoles = f.AllowedRoles ? f.AllowedRoles.split(',').map(r=>String(r).trim().toUpperCase()) : ["ALL"];
if (userRole === "ADMIN" || allowedRoles.includes("ALL") || allowedRoles.includes(userRole)) {
formsToProcess.push(f);
prefixMap[f.FormID] = f.FormID;
}
});
} else {
const f = masterData.forms.find(x => x.FormID === fId);
if(f) {
formsToProcess.push(f);
prefixMap[f.FormID] = isBulk ? f.FormID : "single";
}
}

let q = JSON.parse(localStorage.getItem("syncQueue") || "[]");
let history = JSON.parse(localStorage.getItem("submissionHistory") || "[]");

let hasNewData = false;

formsToProcess.forEach(f => {
let formPrefix = prefixMap[f.FormID];

availableVillages.forEach(village => {
if (String(f.FormType).trim() === 'List') {
let tbody = document.getElementById(`list_tbody_${f.FormID}`);
if(tbody) {
let addedCount = 0;
Array.from(tbody.children).forEach(tr => {
let rowIdParts = tr.id.split('_');
let rIdx = rowIdParts[rowIdParts.length - 1];
let prefix = `list_${f.FormID}_${rIdx}`;

calculateAutoSums(tr.id);
handleDependencies(tr.id);

let formData = extractFormData(f, prefix);

let isEmpty = true;
for(let key in formData) {
if(formData[key] !== undefined && String(formData[key]).trim() !== "") {
isEmpty = false;
break;
}
}

if(!isEmpty) {
formData["महिना"] = month;
formData["वर्ष"] = year;
const entry = { entryID: Date.now() + Math.random(), mobileNo: String(user.mobile).trim(), subCenter: String(user.subcenter).trim(), village: String(village).trim(), formID: f.FormID, formData: formData };
q.push(entry);
hasNewData = true;
addedCount++;

});
if(addedCount > 0) {
history.push({formID: f.FormID, village: String(village).trim(), month: String(month).trim(), year: String(year).trim(), mobile: String(user.mobile).trim()});
}
}
} else {

let containerId = isBulk ? `bulkrow_${formPrefix}_${safeVName}` : `form_area_${f.FormID}`;

calculateAutoSums(containerId);
handleDependencies(containerId);

formData["वर्ष"] = year;

const entry = { entryID: Date.now() + Math.random(), mobileNo: String(user.mobile).trim(), subCenter: String(user.subcenter).trim(), village: String(village).trim(), formID: f.FormID, formData: formData };

hasNewData = true;

});
});

if(!hasNewData) {

document.getElementById('dynamicFormArea').innerHTML = "";

updateFormDropdowns(); 
updateVillageDropdown();

} catch (error) {

} finally {
isSaving = false;
if(saveBtn) saveBtn.disabled = false;
}
}

async function syncDataToServer(statusId, btnId) {
let q = JSON.parse(localStorage.getItem("syncQueue") || "[]");
const saveBtn = document.getElementById(btnId);

if(q.length === 0) {
if(saveBtn) saveBtn.disabled = false;
return;
}

const statusText = document.getElementById(statusId);
statusText.style.color = "orange";
statusText.innerText = "☁️ डेटा गुगल शीटवर सेव्ह होत आहे... कृपया थांबा.";

try {
const r = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({action:"syncData", payload: q}) });
const textResponse = await r.text();
if(textResponse.trim().startsWith("<")) throw new Error("Google Blocked Request");

const d = JSON.parse(textResponse);
if(d.success) {
localStorage.setItem("syncQueue", "[]");
statusText.style.color = "green";
statusText.innerText = "✅ माहिती यशस्वीरित्या गुगल शीटवर सेव्ह झाली!";
setTimeout(() => { statusText.innerText = ""; }, 4000);
await fetchData(); 
} else { throw new Error("Server error"); }
} catch(e) {
statusText.style.color = "red";
statusText.innerText = "⚠️ इंटरनेट एरर! माहिती मोबाईलमध्ये सुरक्षित आहे, नेटवर्क आल्यावर पुन्हा जतन करा दाबा.";
setTimeout(() => { statusText.innerText = ""; }, 5000);
} finally {
if(saveBtn) saveBtn.disabled = false;
}
}

function calculateAutoSums(containerId) {
let container = document.getElementById(containerId);
if(!container) return;

let sumInputs = container.querySelectorAll('input[data-sum-targets]');

for(let loop = 0; loop < 2; loop++) {
sumInputs.forEach(sumInput => {
let targets = sumInput.getAttribute('data-sum-targets').split(',');
let total = 0;
let hasValue = false;

targets.forEach(targetLabel => {
let tLabel = targetLabel.trim();
if(!tLabel) return;

let targetElement = container.querySelector(`[data-label="${tLabel}"]`);

if(!targetElement) {
let allInputs = container.querySelectorAll('[data-label]');
let cleanTarget = tLabel.replace(/\s+/g, '').toLowerCase();

for(let inp of allInputs) {
let currentLabel = inp.getAttribute('data-label').replace(/\s+/g, '').toLowerCase();

if(currentLabel === cleanTarget) {
targetElement = inp;
break;
}
if(currentLabel.endsWith(cleanTarget) || currentLabel.endsWith("-" + cleanTarget)) {
targetElement = inp;
break;
}
}
}

if(targetElement && targetElement.value !== "") {
let val = parseFloat(targetElement.value);
if(!isNaN(val)) {
total += val;
hasValue = true;
}
}
});

if(hasValue) {
sumInput.value = total;
} else {
sumInput.value = "";
}
});
}
}

let isNumericCol = Array(headers.length).fill(false);
for(let c of showIndices) {
let colName = headers[c] || "";
if(colName.includes("मोबाईल") || colName.includes("क्रमांक") || colName === "तारीख" || colName === "महिना" || colName === "वर्ष" || colName === "उपकेंद्र" || colName === "गाव" || colName === "ग्रामपंचायत" || colName.includes("नाव") || colName.includes("स्तर")) {
continue;
}
let isNum = false;
let colSum = 0;
for(let r=1; r<data.length; r++) {
let val = String(data[r][c] || "").trim();
if(val !== "" && val !== "-") {
if(!isNaN(val)) {
isNum = true;
colSum += parseFloat(val);
} else {
isNum = false;
break;
}
}
}
if(isNum) {
isNumericCol[c] = true;
totals[c] = colSum;
}
}
return { totals, isNumericCol };
}

function getProgressiveTargetMonthsAndYears(selM, selY) {
    const months = ["जानेवारी", "फेब्रुवारी", "मार्च", "एप्रिल", "मे", "जून", "जुलै", "ऑगस्ट", "सप्टेंबर", "ऑक्टोबर", "नोव्हेंबर", "डिसेंबर"];
    const fyStartMonthIdx = 3; 
    let selectedMonthIdx = months.indexOf(selM);
    let sYear = parseInt(selY);

    let result = [];
    if (selectedMonthIdx >= fyStartMonthIdx) {
        for(let i = fyStartMonthIdx; i <= selectedMonthIdx; i++) {
            result.push({m: months[i], y: String(sYear)});
        }
    } else {
        for(let i = fyStartMonthIdx; i <= 11; i++) {
            result.push({m: months[i], y: String(sYear - 1)});
        }
        for(let i = 0; i <= selectedMonthIdx; i++) {
            result.push({m: months[i], y: String(sYear)});
        }
    }
    return result;
}

const d = JSON.parse(responseText);
document.getElementById('reportLoader').style.display = "none";

if(d.success) {

let finalReports = [];
d.reports.forEach(rep => {

    const formObj = masterData.forms.find(x => x.FormName === rep.formName);

    let fData = [];
    let dataRows = [];

    if (isProgressive && selMonth !== "सर्व" && selYear !== "सर्व") {
        let flatFields = extractFieldsFromForm(formObj);
        let numericLabels = flatFields.filter(f => f.orig.type === 'number' || f.orig.type === 'sum').map(f => f.label);

        let newHeaders = [];
        let numMap = {}; 
        
        headers.forEach((h, i) => {
            if (numericLabels.includes(h)) {
                newHeaders.push(`${h} - चालू महिना`);
                newHeaders.push(`${h} - क्रमिक (एप्रिलपासून)`);
                numMap[i] = true;
            } else {
                newHeaders.push(h);
            }
        });
        fData.push(newHeaders);

        let targetPeriods = getProgressiveTargetMonthsAndYears(selMonth, selYear);
        let villageData = {};

        for(let i=1; i<rep.data.length; i++) {
            let row = rep.data[i];
            let m = String(row[monthIdx]).trim();
            let y = String(row[yearIdx]).trim();
            let v = String(row[villageIdx] || "").trim();

            let isMatch = targetPeriods.some(p => p.m === m && p.y === y);

            if(isMatch) {
                let sc = headers.indexOf("उपकेंद्र") > -1 ? String(row[headers.indexOf("उपकेंद्र")]).trim() : "";
                let empName = headers.indexOf("कर्मचाऱ्याचे नाव") > -1 ? String(row[headers.indexOf("कर्मचाऱ्याचे नाव")]).trim() : "";
                let mob = headers.indexOf("मोबाईल क्र.") > -1 ? String(row[headers.indexOf("मोबाईल क्र.")]).trim() : "";

                let gKey = `${sc}_${mob}_${v}`;

                if(!villageData[gKey]) {
                    villageData[gKey] = { baseRow: Array(headers.length).fill("-"), progressive: {}, monthly: {} };
                    headers.forEach((_, cIdx) => {
                        if(!numMap[cIdx]) villageData[gKey].baseRow[cIdx] = row[cIdx];
                    });
                }

                if (m === selMonth && y === selYear) {
                    headers.forEach((_, cIdx) => {
                        if(!numMap[cIdx]) villageData[gKey].baseRow[cIdx] = row[cIdx];
                    });
                }

                headers.forEach((_, cIdx) => {
                    if (numMap[cIdx]) {
                        let val = parseFloat(row[cIdx]);
                        if(!isNaN(val)) {
                            villageData[gKey].progressive[cIdx] = (villageData[gKey].progressive[cIdx] || 0) + val;
                            if (m === selMonth && y === selYear) {
                                villageData[gKey].monthly[cIdx] = val;
                            }
                        }
                    }
                });
            }
        }

        Object.keys(villageData).forEach(k => {
            let vData = villageData[k];
            let newRow = [];
            headers.forEach((h, cIdx) => {
                if (numMap[cIdx]) {
                    newRow.push(vData.monthly[cIdx] !== undefined ? vData.monthly[cIdx] : 0);
                    newRow.push(vData.progressive[cIdx] !== undefined ? vData.progressive[cIdx] : 0);
                } else {
                    newRow.push(vData.baseRow[cIdx] !== undefined ? vData.baseRow[cIdx] : "-");
                }
            });
            if(monthIdx > -1) newRow[monthIdx] = selMonth;
            if(yearIdx > -1) newRow[yearIdx] = selYear;
            
            dataRows.push(newRow);
        });

    } else {
        fData.push(headers);
        for(let i=1; i<rep.data.length; i++) {
            let row = rep.data[i];
            let matchMonth = (selMonth === "सर्व" || String(row[monthIdx]).trim() === String(selMonth).trim());
            let matchYear = (selYear === "सर्व" || String(row[yearIdx]).trim() === String(selYear).trim());
            if(matchMonth && matchYear) dataRows.push(row);
        }
    }

    fData = fData.concat(dataRows);
    finalReports.push({ formName: rep.formName, data: fData });
});

if(finalReports.length > 0) {
currentReports = finalReports;
renderMultipleTables(finalReports, selMonth, selYear);
document.getElementById('reportContentArea').classList.remove('hidden');
} else { alert("निवडलेल्या महिना आणि वर्षासाठी कोणताही डेटा उपलब्ध नाही."); }
} else { alert("अद्याप कोणतीही माहिती उपलब्ध नाही."); }
} else { alert("सर्व्हरकडून माहिती मिळाली नाही."); }
} catch(e) {
console.error("Report Fetch Error:", e);
document.getElementById('reportLoader').style.display = "none";
alert("एरर: " + e.message);
}
}

// 🟢 Reports नेहमी 3-Level Data Sheet मध्ये दिसण्यासाठी (मोबाईल आणि पीसी दोन्हीवर)
function renderMultipleTables(reports, month, year) {
let container = document.getElementById('reportTableContainer');
let html = "";
let periodText = (month === 'सर्व' && year === 'सर्व') ? 'सर्व महिने' : `${month} ${year !== 'सर्व' ? year : ''}`;

reports.forEach(rep => {
let data = rep.data;
let headers = data[0];
let showIndices = [];
headers.forEach((h, i) => { if(!CONFIG.hiddenColumns.includes(h)) showIndices.push(i); });

const formObj = masterData.forms.find(x => x.FormName === rep.formName);
const isStats = formObj && (String(formObj.FormType).trim() === 'Stats' || String(formObj.FormType).trim() === 'ProgressiveStats');

let subCenterIdx = headers.indexOf("उपकेंद्र");
let nameIdx = headers.indexOf("कर्मचाऱ्याचे नाव");
let mobIdx = headers.indexOf("मोबाईल क्र.");
let villageIdx = headers.indexOf("गाव");

// Build Tree Logic for 3-Level Headers
let h1Arr = [], h2Arr = [], h3Arr = [];
showIndices.forEach(idx => {
    let parts = headers[idx].split(" - ");
    h1Arr.push(parts[0] ? parts[0].trim() : "");
    if(parts.length === 2) {
        h2Arr.push(parts[1].trim());
        h3Arr.push("");
    } else if(parts.length >= 3) {
        h2Arr.push(parts[1].trim());
        h3Arr.push(parts.slice(2).join(" - ").trim());
    } else {
        h2Arr.push("");
        h3Arr.push("");
    }
});

let maxDepth = 1;
if(h2Arr.some(h => h !== "")) maxDepth = 2;
if(h3Arr.some(h => h !== "")) maxDepth = 3;

let tree = [];
for(let c=0; c<h1Arr.length; c++) {
    let h1 = h1Arr[c], h2 = h2Arr[c], h3 = h3Arr[c];
    let last1 = tree.length > 0 ? tree[tree.length-1] : null;
    
    if(last1 && last1.label === h1 && h1 !== "") {
        let last2 = last1.children.length > 0 ? last1.children[last1.children.length-1] : null;
        if(last2 && last2.label === h2 && h2 !== "") {
            last2.children.push({label: h3, colspan: 1});
            last2.colspan++;
        } else {
            last1.children.push({label: h2, colspan: 1, children: h3 !== "" ? [{label: h3, colspan: 1}] : []});
        }
        last1.colspan++;
    } else {
        tree.push({label: h1, colspan: 1, children: h2 !== "" ? [{label: h2, colspan: 1, children: h3 !== "" ? [{label: h3, colspan: 1}] : []}] : []});
    }
}

let dataRows = data.slice(1);
let groups = {};
if(dataRows.length === 0) { groups["All"] = []; } 
else {
    dataRows.forEach(row => {
        let sc = subCenterIdx > -1 ? String(row[subCenterIdx] || "").trim() : "Unknown";
        let mob = mobIdx > -1 ? String(row[mobIdx] || "").trim() : "Unknown";
        let ename = nameIdx > -1 ? String(row[nameIdx] || "").trim() : mob;
        if(ename === "undefined" || ename === "") ename = mob;
        let key = sc + "###" + ename;
        if(!groups[key]) groups[key] = [];
        groups[key].push(row);
    });
}

let groupKeys = Object.keys(groups).sort();

html += `<div style="background:white; padding:15px; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.1); margin-bottom:20px;">`;
html += `<h3 style="color:var(--primary); border-bottom:2px solid var(--primary); padding-bottom:10px;">${rep.formName} अहवाल</h3>`;

groupKeys.forEach((gKey) => {
    let gRows = groups[gKey];
    let [sc, ename] = gKey.split("###");

    if(villageIdx > -1) {
        gRows.sort((a, b) => String(a[villageIdx]||"").localeCompare(String(b[villageIdx]||"")));
    }

    if(dataRows.length > 0) {
        html += `<div style="background:#e8f4f8; padding:10px; border-left:5px solid var(--secondary); margin-top:20px; font-weight:bold; color:#0056b3; border-radius:4px;">
        उपकेंद्र: <span style="color:#333;">${sc}</span> &nbsp;&nbsp;|&nbsp;&nbsp; कर्मचारी: <span style="color:#333;">${ename}</span> &nbsp;&nbsp;|&nbsp;&nbsp; अहवाल महिना: <span style="color:#333;">${periodText}</span>
        </div>`;
    }

    // 🟢 नेहमी Data Sheet (Table View) दिसेल
    let r1Html = "<tr>", r2Html = "<tr>", r3Html = "<tr>";
    r1Html += `<th rowspan="${maxDepth}" style="background:#f4b400; color:#000; border:1px solid #ddd; vertical-align:middle; text-align:center; position:sticky; left:0; z-index:2;">अ.क्र.</th>`;

    tree.forEach(n1 => {
        let rs1 = n1.children.length === 0 ? maxDepth : 1;
        r1Html += `<th colspan="${n1.colspan}" rowspan="${rs1}" style="background:#f4b400; color:#000; border:1px solid #ddd; text-align:center; padding:8px;">${n1.label}</th>`;
        if (n1.children.length > 0) {
            n1.children.forEach(n2 => {
                let rs2 = n2.children.length === 0 ? (maxDepth - 1) : 1;
                r2Html += `<th colspan="${n2.colspan}" rowspan="${rs2}" style="background:#ffe082; color:#000; border:1px solid #ddd; font-size:13px; text-align:center; padding:6px;">${n2.label}</th>`;
                if(n2.children.length > 0) {
                    n2.children.forEach(n3 => {
                        r3Html += `<th style="background:#fff3e0; color:#000; border:1px solid #ddd; font-size:12px; text-align:center; padding:6px;">${n3.label}</th>`;
                    });
                }
            });
        }
    });
    r1Html += "</tr>"; r2Html += "</tr>"; r3Html += "</tr>";

    let theadHtml = r1Html;
    if(maxDepth >= 2) theadHtml += r2Html;
    if(maxDepth === 3) theadHtml += r3Html;
    
    html += `<div class="table-responsive"><table class="report-table" style="margin-top:0; border-top:none;"><thead>${theadHtml}</thead><tbody>`;

    if(gRows.length === 0) {
        html += `<tr><td colspan="${showIndices.length+1}" style="color:red; font-weight:bold; font-size:16px;">निरंक (Nil)</td></tr>`;
    } else {
        gRows.forEach((row, i) => {
            html += `<tr><td class="sticky-col" style="background:#fdfdfd;">${i+1}</td>`;
            showIndices.forEach(idx => { html += `<td>${row[idx] || "-"}</td>`; });
            html += `</tr>`;
        });

        if(isStats && gRows.length > 0) {
            let pseudoData = [headers].concat(gRows);
            let { totals, isNumericCol } = getTotalsRow(pseudoData, headers, showIndices);
            html += `<tr style="background:#d4edda; font-weight:bold; color:#155724;"><td class="sticky-col" style="background:#d4edda;">एकूण</td>`;
            showIndices.forEach(idx => {
                if(isNumericCol[idx]) html += `<td>${totals[idx]}</td>`;
                else html += `<td>-</td>`;
            });
            html += `</tr>`;
        }
    }
    html += `</tbody></table></div>`;
});
html += `</div>`;
});
container.innerHTML = html;
}

showIndices.forEach(idx => {

    h1Arr.push(parts[0] ? parts[0].trim() : "");

        h2Arr.push(parts[1].trim());

        h2Arr.push(parts[1].trim());
        h3Arr.push(parts.slice(2).join(" - ").trim());
    } else {
        h2Arr.push(""); h3Arr.push("");
    }
});

let maxDepth = 1;
if(h2Arr.some(h => h !== "")) maxDepth = 2;
if(h3Arr.some(h => h !== "")) maxDepth = 3;

let tree = [];
for(let c=0; c<h1Arr.length; c++) {
    let h1 = h1Arr[c], h2 = h2Arr[c], h3 = h3Arr[c];

    }
}

let sheetData = [];
let merges = [];

sheetData.push([`${rep.formName} अहवाल`]);
sheetData.push(Array(colCount).fill(""));
merges.push({ s: { r: 0, c: 0 }, e: { r: 0, c: colCount - 1 } });

let dataRows = data.slice(1);
let groups = {};
if(dataRows.length === 0) { groups["All"] = []; } 
else {
    dataRows.forEach(row => {
        let sc = subCenterIdx > -1 ? String(row[subCenterIdx] || "").trim() : "Unknown";

}

let groupKeys = Object.keys(groups).sort();
let currentR = 2;

let groupHeaderRows = [];
let headerRowIndices = [];

groupKeys.forEach(gKey => {

    let headerRow2 = Array(colCount).fill("");
    let headerRow3 = Array(colCount).fill("");
    headerRow1[0] = "अ.क्र.";
    merges.push({ s: { r: currentR, c: 0 }, e: { r: currentR + maxDepth - 1, c: 0 } });
    
    let cOffset = 1;
    tree.forEach(n1 => {
        headerRow1[cOffset] = n1.label;
        let rs1 = n1.children.length === 0 ? maxDepth : 1;
        if(n1.colspan > 1 || rs1 > 1) merges.push({ s: { r: currentR, c: cOffset }, e: { r: currentR + rs1 - 1, c: cOffset + n1.colspan - 1 } });
        
        let cOffset2 = cOffset;
        n1.children.forEach(n2 => {
            headerRow2[cOffset2] = n2.label;
            let rs2 = n2.children.length === 0 ? (maxDepth - 1) : 1;
            if(n2.colspan > 1 || rs2 > 1) merges.push({ s: { r: currentR + 1, c: cOffset2 }, e: { r: currentR + 1 + rs2 - 1, c: cOffset2 + n2.colspan - 1 } });
            
            let cOffset3 = cOffset2;
            n2.children.forEach(n3 => {
                headerRow3[cOffset3] = n3.label;

            });
            cOffset2 += n2.colspan;
        });
        cOffset += n1.colspan;
    });

    sheetData.push(headerRow1); headerRowIndices.push(currentR);
    if(maxDepth >= 2) { sheetData.push(headerRow2); headerRowIndices.push(currentR+1); }
    if(maxDepth === 3) { sheetData.push(headerRow3); headerRowIndices.push(currentR+2); }
    currentR += maxDepth;

    if(gRows.length === 0) {
        let nilRow = Array(colCount).fill(""); nilRow[0] = "निरंक (Nil)";
        sheetData.push(nilRow);
        merges.push({ s: { r: currentR, c: 0 }, e: { r: currentR, c: colCount - 1 } });

            currentR++;
        });

        if(isStats) {
            let pseudoData = [headers].concat(gRows);

                if(isNumericCol[idx]) totalRow.push(totals[idx]);
                else totalRow.push("-");
            });
            sheetData.push(totalRow);
            headerRowIndices.push(currentR); // Styling total row similar to header
            currentR++;
        }
    }
    sheetData.push(Array(colCount).fill(""));
    currentR++;
});

let ws = XLSX.utils.aoa_to_sheet(sheetData);
ws["!merges"] = merges;

cellStyle.font = { name: "Arial", sz: 12, bold: true, color: { rgb: "0056B3" } };
cellStyle.alignment = { vertical: "center", horizontal: "left", wrapText: true };
cellStyle.border = { top: { style: "medium", color: { rgb: "0056B3" } }, bottom: { style: "medium", color: { rgb: "0056B3" } } };
} else if(headerRowIndices.includes(R)) {
cellStyle.fill = { fgColor: { rgb: "F4B400" } };
cellStyle.font = { name: "Arial", sz: 11, bold: true, color: { rgb: "000000" } };
cellStyle.border = { top: { style: "thin" }, bottom: { style: "thin" }, left: { style: "thin" }, right: { style: "thin" } };
} else if(sheetData[R][0] !== "") {
if(sheetData[R][0] === "निरंक (Nil)") {
cellStyle.font = { name: "Arial", sz: 12, bold: true, color: { rgb: "FF0000" } };
} else {
cellStyle.border = { top: { style: "thin" }, bottom: { style: "thin" }, left: { style: "thin" }, right: { style: "thin" } };
}
}
ws[cellRef].s = cellStyle;
}
}

let wscols = [{ wch: 8 }];
for(let c=1; c<colCount; c++) wscols.push({ wch: 20 });
ws["!cols"] = wscols;

let safeSheetName = rep.formName.replace(/[\\\/\?\*\[\]\:]/g, "").substring(0, 31);
if(!safeSheetName) safeSheetName = "Sheet" + (index + 1);
XLSX.utils.book_append_sheet(wb, ws, safeSheetName);
});

let fileName = `मासिक_अहवाल_${user.subcenter}_${periodText}.xlsx`;
XLSX.writeFile(wb, fileName);
}

function toggleRoles(checkbox) {
document.getElementById('specificRoles').style.display = checkbox.checked ? 'none' : 'block';
if(checkbox.checked) {
document.querySelectorAll('.form-role').forEach(cb => cb.checked = false);
}
}

function getSelectedRoles() {
if(document.getElementById('roleAll').checked) return "ALL";
let roles = [];
document.querySelectorAll('.form-role:checked').forEach(cb => roles.push(cb.value));
return roles.length > 0 ? roles.join(',') : "ALL";
}

function startEditing(fId) {
const f = masterData.forms.find(x => x.FormID === fId);
if(!f) return;
document.getElementById('existingFormsArea').classList.add('hidden');
document.getElementById('formBuilder').classList.remove('hidden');
document.getElementById('builderTitle').innerText = "फॉर्म एडिट: " + f.FormName;
document.getElementById('editFormID').value = f.FormID;
document.getElementById('newFormName').value = f.FormName;
document.getElementById('newFormType').value = f.FormType;

document.getElementById('formIsActive').checked = !isFormInactive(f);

let roles = f.AllowedRoles ? f.AllowedRoles.split(',').map(r=>String(r).trim().toUpperCase()) : ["ALL"];
if(roles.includes("ALL")) {
document.getElementById('roleAll').checked = true;
toggleRoles(document.getElementById('roleAll'));
} else {
document.getElementById('roleAll').checked = false;
toggleRoles(document.getElementById('roleAll'));
document.querySelectorAll('.form-role').forEach(cb => {
cb.checked = roles.includes(cb.value.toUpperCase());
});
}

document.getElementById('fieldsList').innerHTML = "";
document.getElementById('mainActionBtn').innerText = "बदल अपडेट करा (Update)";
document.getElementById('mainActionBtn').onclick = updateExistingForm;
JSON.parse(f.StructureJSON).forEach(field => addField(field));
}

function getFieldsData() {
let fields = [];
document.querySelectorAll('.field-card').forEach(el => {
let fieldObj = {
label: el.querySelector('.fname').value,
type: el.querySelector('.ftype').value,
options: el.querySelector('.foptions') ? el.querySelector('.foptions').value : "",
range: el.querySelector('.frange') ? el.querySelector('.frange').value : "",
dependency: el.querySelector('.fdepend') ? el.querySelector('.fdepend').value : ""
};
if (fieldObj.type === 'group') {
fieldObj.subFields = [];
el.querySelectorAll('.sub-field-item').forEach(sfEl => {
let sfObj = {
label: sfEl.querySelector('.sfname').value,
type: sfEl.querySelector('.sftype').value,
options: sfEl.querySelector('.sfopts') ? sfEl.querySelector('.sfopts').value : "",
range: sfEl.querySelector('.sfrange') ? sfEl.querySelector('.sfrange').value : "",
dependency: sfEl.querySelector('.sfdepend') ? sfEl.querySelector('.sfdepend').value : ""
};
if(sfObj.type === 'group') {
sfObj.subFields = [];
sfEl.querySelectorAll('.sub-sub-field-item').forEach(ssfEl => {
sfObj.subFields.push({
label: ssfEl.querySelector('.ssfname').value,
type: ssfEl.querySelector('.ssftype').value,
options: ssfEl.querySelector('.ssfopts') ? ssfEl.querySelector('.ssfopts').value : "",
range: ssfEl.querySelector('.ssfrange') ? ssfEl.querySelector('.ssfrange').value : "",
dependency: ssfEl.querySelector('.ssfdepend') ? ssfEl.querySelector('.ssfdepend').value : ""
});
});
}
fieldObj.subFields.push(sfObj);
});
}
fields.push(fieldObj);
});
return fields;
}

async function saveFullForm() {
const name = document.getElementById('newFormName').value;
const type = document.getElementById('newFormType').value;
const isActive = document.getElementById('formIsActive').checked;
const statusText = isActive ? "Active" : "Inactive";
const allowedRoles = getSelectedRoles();

if(!name) { alert("फॉर्मचे नाव टाका"); return; }
if(allowedRoles === "" && !document.getElementById('roleAll').checked) { alert("कृपया किमान एक Role निवडा."); return; }

const payload = { name, type, allowedRoles, isActive, status: statusText, fields: getFieldsData(), adminMobile: user.mobile };
const r = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({action:"createForm", payload}) });
const d = await r.json();
if(d.success) { alert(d.message); location.reload(); }
}

const statusText = isActive ? "Active" : "Inactive";
const allowedRoles = getSelectedRoles();

if(allowedRoles === "" && !document.getElementById('roleAll').checked) { alert("कृपया किमान एक Role निवडा."); return; }

const payload = { formID, name, type, allowedRoles, isActive, status: statusText, fields: getFieldsData() };
const r = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({action:"updateForm", payload}) });
const d = await r.json();
if(d.success) { alert(d.message); location.reload(); }
}
</script>
