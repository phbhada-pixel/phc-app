<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHC Advance Management</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root { --primary: #00705a; --secondary: #0056b3; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding: 0; font-size: 16px; }
        .container { max-width: 800px; margin: 20px auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2, h3, h4 { text-align: center; color: #333; margin-top: 5px; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box; font-size: 16px; }
        .btn-primary { background: var(--primary); color: white; font-weight: bold; border: none; cursor: pointer; }
        .btn-admin { background: #6c757d; color: white; border: none; cursor: pointer; }
        .btn-report { background: #17a2b8; color: white; border: none; cursor: pointer; font-weight: bold; }
        .field-card { border: 2px solid #ccc; padding: 15px; margin: 10px 0; border-radius: 8px; background: #fafafa; position: relative; }
        .hidden { display: none !important; }
        .status-bar { padding: 10px; text-align: center; font-weight: bold; border-radius: 5px; margin-bottom: 15px; }
        .online { background: #d4edda; color: #155724; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        .btn-logout { background: #dc3545; color: white; padding: 6px 12px; font-size: 14px; border: none; border-radius: 4px; cursor: pointer; width: auto; }
        .row-flex { display: flex; gap: 10px; align-items: center; }
        .row-flex > div { flex: 1; }
        
        .table-responsive { width: 100%; overflow-x: auto; margin-top: 15px; }
        .report-table { width: 100%; border-collapse: collapse; min-width: 600px; background: white; margin-bottom: 25px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); border: 1px solid #ddd; }
        .report-table th { padding: 10px; text-align: center; white-space: nowrap; border: 1px solid #ddd; }
        .report-table td { padding: 8px 10px; border: 1px solid #ddd; font-size: 14px; color: #333; text-align: center; }
        .report-table tr:nth-child(even) { background-color: #f9f9f9; }
        .report-table tr:hover { background-color: #f1f1f1; }
        
        .nav-tabs { display: flex; gap: 5px; margin-bottom: 20px; background: #eee; padding: 5px; border-radius: 8px; }
        .nav-tab { flex: 1; text-align: center; padding: 10px; background: transparent; border: none; font-weight: bold; color: #555; border-radius: 6px; cursor: pointer; }
        .nav-tab.active { background: white; color: var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div id="lockScreen" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#0f1c24; z-index:9999; display:flex; justify-content:center; align-items:center;">
        <div style="background:white; padding:30px; border-radius:10px; width:85%; max-width:350px;">
            <h3>Security Access</h3>
            <input type="password" id="sitePass" placeholder="Enter Password (1234)">
            <button class="btn-primary" onclick="unlockApp()">Unlock</button>
        </div>
    </div>

    <div class="container hidden" id="mainApp">
        <div id="netStatus" class="status-bar online">Online</div>

        <div id="loginBox">
            <h3>कर्मचारी लॉगिन</h3>
            <input type="tel" id="mob" placeholder="मोबाईल नंबर">
            <input type="password" id="pwd" placeholder="वैयक्तिक पासवर्ड">
            <button class="btn-primary" onclick="handleLogin()">प्रवेश करा</button>
        </div>

        <div id="dashboardWrapper" class="hidden">
            <div class="header-bar">
                <div>
                    <h3 style="margin: 0;">स्वागत आहे, <span id="uName"></span></h3>
                    <p id="uSub" style="margin: 2px 0 0 0; font-size: 13px; color: gray;"></p>
                </div>
                <button class="btn-logout" onclick="logoutUser()">Log Out</button>
            </div>

            <div class="nav-tabs">
                <button class="nav-tab active" id="tabEntry" onclick="switchTab('entry')">📝 डेटा एंट्री</button>
                <button class="nav-tab" id="tabReports" onclick="switchTab('reports')">📊 रिपोर्ट्स</button>
                <button class="nav-tab hidden" id="tabAdmin" onclick="switchTab('admin')">⚙️ ॲडमिन</button>
            </div>

            <div id="entrySection">
                <label>फॉर्म निवडा:</label>
                <select id="selForm" onchange="updateVillageDropdown(); loadDynamicFields();"></select>
                
                <div class="row-flex" style="margin-top: 10px;">
                    <div>
                        <label>महिना:</label>
                        <select id="selMonth" onchange="updateVillageDropdown()">
                            <option value="जानेवारी">जानेवारी</option><option value="फेब्रुवारी">फेब्रुवारी</option>
                            <option value="मार्च">मार्च</option><option value="एप्रिल" selected>एप्रिल</option>
                            <option value="मे">मे</option><option value="जून">जून</option>
                            <option value="जुलै">जुलै</option><option value="ऑगस्ट">ऑगस्ट</option>
                            <option value="सप्टेंबर">सप्टेंबर</option><option value="ऑक्टोबर">ऑक्टोबर</option>
                            <option value="नोव्हेंबर">नोव्हेंबर</option><option value="डिसेंबर">डिसेंबर</option>
                        </select>
                    </div>
                    <div>
                        <label>वर्ष:</label>
                        <select id="selYear" onchange="updateVillageDropdown()">
                            <option value="2025">2025</option><option value="2026" selected>2026</option>
                        </select>
                    </div>
                </div>
                
                <div style="display:flex; justify-content:space-between; align-items:center; margin-top: 10px;">
                    <label style="margin:0;">गाव निवडा:</label>
                    <button onclick="clearLocalHistory()" style="background:#ffc107; color:#000; border:none; padding:5px 10px; border-radius:4px; font-size:12px; font-weight:bold; cursor:pointer;">
                        🔄 गावे रीसेट करा
                    </button>
                </div>
                <select id="selVillage"></select>

                <div id="dynamicFormArea"></div>
                
                <button class="btn-primary" onclick="saveDataLocal()" style="margin-top:20px;">माहिती जतन करा</button>
                <button onclick="syncDataToServer()" style="background:#28a745; color:white;">Cloud Sync</button>
                <p id="syncStatus" style="text-align:center; font-size:14px; color:green; font-weight:bold;"></p>
            </div>

            <div id="reportsSection" class="hidden">
                <h3>मासिक अहवाल डाउनलोड करा</h3>
                
                <div class="row-flex" style="margin-bottom: 15px;">
                    <div style="flex: 2;">
                        <label>अहवाल निवडा:</label>
                        <select id="reportFormSelect"></select>
                    </div>
                </div>
                <div class="row-flex" style="margin-bottom: 15px;">
                    <div>
                        <label>महिना:</label>
                        <select id="reportMonth">
                            <option value="सर्व">सर्व महिने</option>
                            <option value="जानेवारी">जानेवारी</option><option value="फेब्रुवारी">फेब्रुवारी</option>
                            <option value="मार्च">मार्च</option><option value="एप्रिल" selected>एप्रिल</option>
                            <option value="मे">मे</option><option value="जून">जून</option>
                            <option value="जुलै">जुलै</option><option value="ऑगस्ट">ऑगस्ट</option>
                            <option value="सप्टेंबर">सप्टेंबर</option><option value="ऑक्टोबर">ऑक्टोबर</option>
                            <option value="नोव्हेंबर">नोव्हेंबर</option><option value="डिसेंबर">डिसेंबर</option>
                        </select>
                    </div>
                    <div>
                        <label>वर्ष:</label>
                        <select id="reportYear">
                            <option value="सर्व">सर्व वर्षे</option>
                            <option value="2025">2025</option><option value="2026" selected>2026</option>
                        </select>
                    </div>
                </div>

                <button class="btn-report" onclick="fetchReportData()">अहवाल तयार करा 📊</button>
                
                <div id="reportLoader" style="text-align:center; color:orange; margin-top:10px; display:none; font-weight:bold;">डेटा लोड होत आहे, कृपया थांबा...</div>
                
                <div id="reportContentArea" class="hidden" style="margin-top: 20px;">
                    <div style="text-align: right; margin-bottom: 10px;">
                        <button onclick="downloadConsolidatedExcel()" style="background:#28a745; color:white; border:none; padding:10px 20px; border-radius:5px; cursor:pointer; font-weight:bold; font-size: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">📥 Excel (.xlsx) डाउनलोड करा</button>
                    </div>
                    <div class="table-responsive" id="reportTableContainer"></div>
                </div>
            </div>

            <div id="adminSection" class="hidden">
                <button class="btn-admin" onclick="openNewFormBuilder()">➕ नवीन फॉर्म तयार करा</button>
                <div id="existingFormsArea" style="margin-top:20px;">
                    <h4>अस्तित्वात असलेले फॉर्म (Edit करा)</h4>
                    <div id="formsEditList"></div>
                </div>
                <hr>
                <div id="formBuilder" class="hidden" style="background: #fff8f0; padding: 15px; border-radius: 8px; border: 1px solid orange;">
                    <h3 id="builderTitle">नवीन फॉर्म तयार करा</h3>
                    <input type="hidden" id="editFormID">
                    <input type="text" id="newFormName" placeholder="फॉर्मचे नाव">
                    <select id="newFormType">
                        <option value="List">गावनिहाय लिस्ट</option>
                        <option value="Stats">गावनिहाय आकडेवारी</option>
                    </select>
                    <div id="fieldsList"></div>
                    <button onclick="addField()" style="background:#e9ecef; color:#333; font-weight:bold; border:1px solid #ccc;">+ नवीन प्रश्न जोडा</button>
                    <button id="mainActionBtn" class="btn-primary" onclick="saveFullForm()">फॉर्म सेव्ह करा</button>
                </div>
            </div>

        </div>
    </div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzODuA9XnQrD1vYnwggn7PabqYNd3dp9tMBqTsLyWLdVP3Zl0K-4Zg_fuxjtOHWjQKs/exec";
    let masterData = { forms: [], villages: [], filledStats: [] };
    let user = null;
    let currentReports = []; 

    async function unlockApp() {
        if(document.getElementById('sitePass').value === "1234") {
            document.getElementById('lockScreen').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('netStatus').innerText = "डेटा लोड होत आहे...";
            await fetchData();
            document.getElementById('netStatus').innerText = "Online";

            const savedUser = localStorage.getItem("phc_user_session");
            if(savedUser) { user = JSON.parse(savedUser); showAppAfterLogin(); }
        } else { alert("चुकीचा पासवर्ड!"); }
    }

    async function fetchData() {
        try {
            const r = await fetch(GAS_URL + "?action=getInitialData");
            const d = await r.json();
            if(d.success) { masterData = d; updateFormDropdowns(); renderFormsListForEdit(); }
        } catch(e) { console.error("Fetch failed"); }
    }

    async function handleLogin() {
        const m = document.getElementById('mob').value.trim();
        const p = document.getElementById('pwd').value.trim();
        if(!m || !p) return;
        document.getElementById('netStatus').innerText = "तपासत आहे...";
        try {
            const r = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({action:"login", mobileNo:m, password:p}) });
            const d = await r.json();
            if(d.success) {
                user = d.user; user.mobile = m;
                localStorage.setItem("phc_user_session", JSON.stringify(user));
                showAppAfterLogin();
            } else { alert(d.message); }
            document.getElementById('netStatus').innerText = "Online";
        } catch(e) { alert("लॉगिन अयशस्वी."); document.getElementById('netStatus').innerText = "Offline"; }
    }

    function showAppAfterLogin() {
        document.getElementById('loginBox').classList.add('hidden');
        document.getElementById('dashboardWrapper').classList.remove('hidden');
        document.getElementById('uName').innerText = user.name;
        document.getElementById('uSub').innerText = "उपकेंद्र: " + user.subcenter;
        
        if(user.role === "Admin") { 
            document.getElementById('tabAdmin').classList.remove('hidden'); 
            renderFormsListForEdit(); 
        }
        updateVillageDropdown();
    }

    function logoutUser() {
        if(confirm("लॉग आऊट करायचे आहे का?")) {
            localStorage.removeItem("phc_user_session"); location.reload();
        }
    }

    function switchTab(tab) {
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        document.getElementById('entrySection').classList.add('hidden');
        document.getElementById('reportsSection').classList.add('hidden');
        document.getElementById('adminSection').classList.add('hidden');

        if(tab === 'entry') {
            document.getElementById('tabEntry').classList.add('active');
            document.getElementById('entrySection').classList.remove('hidden');
        } else if(tab === 'reports') {
            document.getElementById('tabReports').classList.add('active');
            document.getElementById('reportsSection').classList.remove('hidden');
        } else if(tab === 'admin') {
            document.getElementById('tabAdmin').classList.add('active');
            document.getElementById('adminSection').classList.remove('hidden');
        }
    }

    function updateFormDropdowns() {
        const selForm = document.getElementById('selForm');
        const repForm = document.getElementById('reportFormSelect');
        selForm.innerHTML = '<option value="">-- निवडा --</option>';
        repForm.innerHTML = '<option value="">-- निवडा --</option><option value="ALL" style="font-weight:bold; color:var(--primary);">सर्व अहवाल एकत्रित (All Forms)</option>';
        masterData.forms.forEach(f => {
            let opt = `<option value="${f.FormID}">${f.FormName}</option>`;
            selForm.innerHTML += opt;
            repForm.innerHTML += opt;
        });
    }

    // --- Report Section ---
    async function fetchReportData() {
        const formID = document.getElementById('reportFormSelect').value;
        const selMonth = document.getElementById('reportMonth').value;
        const selYear = document.getElementById('reportYear').value;

        if(!formID) { alert("कृपया अहवाल निवडा"); return; }
        
        document.getElementById('reportLoader').style.display = "block";
        document.getElementById('reportContentArea').classList.add('hidden');
        document.getElementById('reportTableContainer').innerHTML = "";
        
        try {
            const payload = { formID: formID, role: user.role, subcenter: user.subcenter };
            const r = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({action:"getReportData", payload}) });
            const d = await r.json();
            
            document.getElementById('reportLoader').style.display = "none";
            
            if(d.success && d.reports && d.reports.length > 0) {
                let finalReports = [];
                
                d.reports.forEach(rep => {
                    let headers = rep.data[0];
                    let monthIdx = headers.indexOf("महिना");
                    let yearIdx = headers.indexOf("वर्ष");

                    let fData = [headers];
                    for(let i=1; i<rep.data.length; i++) {
                        let row = rep.data[i];
                        let matchMonth = (selMonth === "सर्व" || row[monthIdx] === selMonth);
                        let matchYear = (selYear === "सर्व" || String(row[yearIdx]) === String(selYear));
                        if(matchMonth && matchYear) fData.push(row);
                    }
                    finalReports.push({ formName: rep.formName, data: fData });
                });

                if(finalReports.length > 0) {
                    currentReports = finalReports;
                    renderMultipleTables(finalReports, selMonth, selYear);
                    document.getElementById('reportContentArea').classList.remove('hidden');
                } else {
                    alert("निवडलेल्या महिना आणि वर्षासाठी कोणताही डेटा उपलब्ध नाही.");
                }
            } else {
                alert("अद्याप कोणतीही माहिती उपलब्ध नाही.");
            }
        } catch(e) {
            document.getElementById('reportLoader').style.display = "none";
            alert("डेटा लोड करण्यात एरर आला.");
        }
    }

    const hiddenColumns = ["तारीख", "मोबाईल क्र.", "उपकेंद्र", "महिना", "वर्ष", "मूळ डेटा (JSON)"];

    function renderMultipleTables(reports, month, year) {
        let container = document.getElementById('reportTableContainer');
        let html = "";
        
        reports.forEach(rep => {
            let data = rep.data;
            let headers = data[0];
            
            let showIndices = [];
            headers.forEach((h, i) => { if(!hiddenColumns.includes(h)) showIndices.push(i); });
            let colCount = showIndices.length + 1; 

            html += `<table class="report-table"><thead>`;
            html += `<tr><th colspan="${colCount}" style="font-size:18px; background:var(--primary); color:white; padding:12px;">${rep.formName}</th></tr>`;
            html += `<tr><th style="background:#f4b400; color:#000;">अ.क्र.</th>`;
            showIndices.forEach(idx => { html += `<th style="background:#f4b400; color:#000;">${headers[idx]}</th>`; });
            html += `</tr></thead><tbody>`;

            if(data.length === 1) {
                html += `<tr><td colspan="${colCount}" style="color:red; font-weight:bold; font-size:16px;">निरंक (Nil)</td></tr>`;
            } else {
                for(let i=1; i<data.length; i++) {
                    html += `<tr><td>${i}</td>`;
                    showIndices.forEach(idx => { html += `<td>${data[i][idx] || "-"}</td>`; });
                    html += `</tr>`;
                }
            }
            html += `</tbody></table>`;
        });
        container.innerHTML = html;
    }

    // --- खरा Excel (.xlsx) तयार करणारी सुधारित कार्यपद्धती (SheetJS) ---
    function downloadConsolidatedExcel() {
        if(currentReports.length === 0) return;
        
        let month = document.getElementById('reportMonth').value;
        let year = document.getElementById('reportYear').value;
        let periodText = (month === 'सर्व' && year
