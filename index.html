<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHC Advance Management</title>
    <style>
        :root { --primary: #00705a; --secondary: #0056b3; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding: 0; font-size: 16px; }
        .container { max-width: 600px; margin: 20px auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2, h3 { text-align: center; color: #333; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box; font-size: 16px; }
        .btn-primary { background: var(--primary); color: white; font-weight: bold; border: none; cursor: pointer; }
        .btn-admin { background: #6c757d; color: white; border: none; cursor: pointer; }
        .field-card { border: 1px dashed #aaa; padding: 15px; margin: 10px 0; border-radius: 8px; background: #fafafa; position: relative; }
        .hidden { display: none !important; }
        .status-bar { padding: 10px; text-align: center; font-weight: bold; border-radius: 5px; margin-bottom: 15px; }
        .online { background: #d4edda; color: #155724; }
        .offline { background: #fff3cd; color: #856404; }
    </style>
</head>
<body>

    <div id="lockScreen" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#0f1c24; z-index:9999; display:flex; justify-content:center; align-items:center;">
        <div style="background:white; padding:30px; border-radius:10px; width:85%; max-width:350px;">
            <h3>Security Access</h3>
            <input type="password" id="sitePass" placeholder="Enter Password (1234)">
            <button class="btn-primary" onclick="unlockApp()">Unlock</button>
        </div>
    </div>

    <div class="container hidden" id="mainApp">
        <div id="netStatus" class="status-bar online">Online</div>

        <div id="loginBox">
            <h3>कर्मचारी लॉगिन</h3>
            <input type="tel" id="mob" placeholder="मोबाईल नंबर">
            <input type="password" id="pwd" placeholder="वैयक्तिक पासवर्ड">
            <button class="btn-primary" onclick="handleLogin()">प्रवेश करा</button>
        </div>

        <div id="adminPanel" class="hidden">
            <div style="display:flex; gap:10px;">
                <button class="btn-admin" onclick="showSection('formBuilder')">➕ नवीन फॉर्म तयार करा</button>
                <button class="btn-primary" onclick="showSection('entryScreen')">⬅️ डेटा एंट्रीकडे जा</button>
            </div>
            <hr>
            <div id="formBuilder" class="hidden">
                <h3>Form Builder</h3>
                <input type="text" id="newFormName" placeholder="फॉर्मचे नाव">
                <select id="newFormType">
                    <option value="List">गावनिहाय लिस्ट</option>
                    <option value="Stats">गावनिहाय आकडेवारी</option>
                </select>
                <div id="fieldsList"></div>
                <button onclick="addField()" style="background:#e9ecef; color:#333;">+ फिल्ड जोडा</button>
                <button class="btn-primary" onclick="saveFullForm()">फॉर्म सेव्ह करा</button>
            </div>
        </div>

        <div id="entryScreen" class="hidden">
            <h3>स्वागत आहे, <span id="uName"></span></h3>
            <p id="uSub" style="text-align:center; color:gray;"></p>
            <div id="adminBtnDiv" class="hidden">
                <button class="btn-admin" onclick="showSection('adminPanel')">⚙️ Admin Settings</button>
            </div>
            
            <label>फॉर्म निवडा:</label>
            <select id="selForm" onchange="loadDynamicFields()"></select>
            
            <label>गाव निवडा:</label>
            <select id="selVillage"></select>

            <div id="dynamicFormArea"></div>
            
            <button class="btn-primary" onclick="saveDataLocal()">माहिती जतन करा</button>
            <button onclick="syncDataToServer()" style="background:#28a745; color:white;">Cloud Sync</button>
            <p id="syncStatus" style="text-align:center; font-size:14px;"></p>
        </div>
    </div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzODuA9XnQrD1vYnwggn7PabqYNd3dp9tMBqTsLyWLdVP3Zl0K-4Zg_fuxjtOHWjQKs/exec";
    let masterData = { forms: [], villages: [] };
    let user = null;

    function unlockApp() {
        if(document.getElementById('sitePass').value === "1234") {
            document.getElementById('lockScreen').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            fetchData();
        }
    }

    async function fetchData() {
        try {
            const r = await fetch(GAS_URL + "?action=getInitialData");
            const d = await r.json();
            if(d.success) { masterData = d; updateFormDropdown(); }
        } catch(e) { console.error("Fetch failed"); }
    }

    function updateFormDropdown() {
        const sel = document.getElementById('selForm');
        sel.innerHTML = '<option value="">-- निवडा --</option>';
        masterData.forms.forEach(f => {
            sel.innerHTML += `<option value="${f.FormID}">${f.FormName}</option>`;
        });
    }

    async function handleLogin() {
        const m = document.getElementById('mob').value.trim();
        const p = document.getElementById('pwd').value.trim();
        if(!m || !p) { alert("नंबर आणि पासवर्ड टाका"); return; }
        try {
            const r = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({action:"login", mobileNo:m, password:p}) });
            const d = await r.json();
            if(d.success) {
                user = d.user; user.mobile = m;
                document.getElementById('loginBox').classList.add('hidden');
                document.getElementById('entryScreen').classList.remove('hidden');
                document.getElementById('uName').innerText = user.name;
                document.getElementById('uSub').innerText = "उपकेंद्र: " + user.subcenter;
                if(user.role === "Admin") document.getElementById('adminBtnDiv').classList.remove('hidden');
                loadVillages();
            } else { alert(d.message); }
        } catch(e) { alert("लॉगिन अयशस्वी. इंटरनेट तपासा."); }
    }

    function loadVillages() {
        const vSel = document.getElementById('selVillage');
        vSel.innerHTML = '<option value="">-- गाव निवडा --</option>';
        // Case-insensitive filtering for "Bhada"
        masterData.villages.filter(v => 
            v.SubCenterID.toLowerCase() === user.subcenter.toLowerCase() || 
            v.SubCenterID.toLowerCase() === "all"
        ).forEach(v => vSel.innerHTML += `<option value="${v.VillageName}">${v.VillageName}</option>`);
    }

    function showSection(id) {
        document.getElementById('entryScreen').classList.add('hidden');
        document.getElementById('adminPanel').classList.add('hidden');
        document.getElementById('formBuilder').classList.add('hidden');
        if(id === 'formBuilder') {
            document.getElementById('adminPanel').classList.remove('hidden');
            document.getElementById('formBuilder').classList.remove('hidden');
        } else {
            document.getElementById(id).classList.remove('hidden');
        }
    }

    function addField() {
        const id = Date.now();
        const html = `
            <div class="field-card" id="f_${id}">
                <div style="display:flex; gap:5px;">
                    <input type="text" placeholder="फिल्डचे नाव" class="fname" style="flex:2;">
                    <input type="text" placeholder="Default व्हॅल्यू" class="fdefault" style="flex:1;">
                </div>
                <select class="ftype">
                    <option value="text">Text (मजकूर)</option>
                    <option value="number">Number (आकडे)</option>
                    <option value="date">Date (तारीख)</option>
                    <option value="yesno">Yes/No (हो/नाही)</option>
                </select>
                <div style="margin-top:10px; background:#eef; padding:10px; border-radius:5px;">
                    <label style="font-size:12px;">सब-फिल्ड हवी असल्यास नाव लिहा:</label>
                    <input type="text" placeholder="सब-फिल्डचे नाव" class="sname">
                </div>
            </div>`;
        document.getElementById('fieldsList').insertAdjacentHTML('beforeend', html);
    }

    async function saveFullForm() {
        const name = document.getElementById('newFormName').value;
        const type = document.getElementById('newFormType').value;
        if(!name) { alert("फॉर्मचे नाव टाका"); return; }
        
        const fieldElements = document.querySelectorAll('.field-card');
        let fields = [];
        fieldElements.forEach(el => {
            fields.push({
                label: el.querySelector('.fname').value,
                defaultVal: el.querySelector('.fdefault').value || "",
                type: el.querySelector('.ftype').value,
                subLabel: el.querySelector('.sname').value || null
            });
        });

        const payload = { name, type, fields, adminMobile: user.mobile };
        const r = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({action:"createForm", payload}) });
        const d = await r.json();
        if(d.success) { alert(d.message); location.reload(); }
    }

    function loadDynamicFields() {
        const fId = document.getElementById('selForm').value;
        const area = document.getElementById('dynamicFormArea');
        area.innerHTML = "";
        const f = masterData.forms.find(x => x.FormID === fId);
        if(!f) return;
        const struct = JSON.parse(f.StructureJSON);
        struct.forEach((field, i) => {
            let inputHtml = "";
            let defValue = field.defaultVal || "";

            if(field.type === 'yesno') {
                inputHtml = `<select id="inp_${i}" onchange="toggleSubDisplay(${i})">
                    <option value="No">No</option>
                    <option value="Yes" ${defValue.toLowerCase() === 'yes' ? 'selected' : ''}>Yes</option>
                </select>`;
            } else {
                inputHtml = `<input type="${field.type}" id="inp_${i}" value="${defValue}">`;
            }

            let subHtml = "";
            if(field.subLabel) {
                subHtml = `<div id="subdiv_${i}" style="display:none; margin-left:20px; border-left:2px solid orange; padding-left:10px;">
                    <label style="color:orange;">${field.subLabel}:</label>
                    <input type="text" id="subinp_${i}">
                </div>`;
            }

            area.innerHTML += `<div style="margin-bottom:15px;"><label><b>${field.label}:</b></label>${inputHtml}${subHtml}</div>`;
        });
    }

    function toggleSubDisplay(i) {
        const subDiv = document.getElementById('subdiv_'+i);
        if(subDiv) {
            const val = document.getElementById('inp_'+i).value;
            subDiv.style.display = (val === 'Yes') ? 'block' : 'none';
        }
    }

    function saveDataLocal() {
        const fId = document.getElementById('selForm').value;
        const vName = document.getElementById('selVillage').value;
        if(!fId || !vName) { alert("फॉर्म आणि गाव निवडा"); return; }
        let formData = {};
        const f = masterData.forms.find(x => x.FormID === fId);
        const struct = JSON.parse(f.StructureJSON);
        struct.forEach((field, i) => {
            formData[field.label] = document.getElementById('inp_'+i).value;
            if(field.subLabel && document.getElementById('subinp_'+i)) {
                formData[field.subLabel] = document.getElementById('subinp_'+i).value;
            }
        });
        const entry = { entryID: Date.now(), mobileNo: user.mobile, subCenter: user.subcenter, village: vName, formID: fId, formData: formData };
        let queue = JSON.parse(localStorage.getItem("syncQueue") || "[]");
        queue.push(entry);
        localStorage.setItem("syncQueue", JSON.stringify(queue));
        alert("माहिती स्थानिकरित्या साठवली!");
    }

    async function syncDataToServer() {
        let queue = JSON.parse(localStorage.getItem("syncQueue") || "[]");
        if(queue.length === 0) { alert("सिंक करण्यासाठी डेटा नाही"); return; }
        document.getElementById('syncStatus').innerText = "सिंक होत आहे...";
        try {
            const r = await fetch(GAS_URL, { method: "POST", body: JSON.stringify({action:"syncData", payload: queue}) });
            const d = await r.json();
            if(d.success) {
                localStorage.setItem("syncQueue", "[]");
                alert("Cloud Sync यशस्वी!");
                document.getElementById('syncStatus').innerText = "";
            }
        } catch(e) { alert("सिंक एरर"); }
    }
</script>
</body>
</html>
